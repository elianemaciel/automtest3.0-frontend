name: Release

on:
  push:
    tags:
      - "automtest-v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            command: npm run release:win
            artifact: |
              release/build/*.exe
              release/build/*.blockmap
              release/build/*.yml

          - name: Ubuntu
            os: ubuntu-latest
            command: npm run release:linux
            artifact: |
              release/build/*.AppImage
              release/build/*.deb
              release/build/*.blockmap
              release/build/*.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Create .env
        shell: bash
        env:
          AUTOMTEST_BACKEND_URL: ${{ secrets.AUTOMTEST_BACKEND_URL }}
        run: |
          node -e 'const fs = require("fs"); fs.writeFileSync(".env", `AUTOMTEST_BACKEND_URL=${process.env.AUTOMTEST_BACKEND_URL}\nNODE_ENV=production\n`);'

      - name: Install dependencies
        run: npm ci

      - name: Build release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ${{ matrix.command }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: automtest-${{ matrix.name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: automtest-*
          merge-multiple: true

      - name: List generated files
        run: find release-artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.blockmap
            release-artifacts/**/*.yml
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}